services:
  postgres:
    image: postgres:16-alpine
    container_name: daily-ai-news-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_news
      POSTGRES_PASSWORD: ai_news
      POSTGRES_DB: ai_news
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_news -d ai_news"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
